version: "3.9"

services:
  # ─────────────── MESSAGE BROKER ───────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── AUTH SERVICE ───────────────
  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    volumes:
      - ./auth-service:/app
    environment:
      JWT_SECRET: "bookstore-super-secret-jwt-key-2024"
      RUNNING_IN_DOCKER: "true"
    depends_on:
      - postgres-auth
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ─────────────── API GATEWAY ───────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway:/app
    environment:
      RUNNING_IN_DOCKER: "true"
      JWT_SECRET: "bookstore-super-secret-jwt-key-2024"
      AUTH_SERVICE_URL: "http://auth-service:8000"
      BOOK_SERVICE_URL: "http://book-service:8000"
      CART_SERVICE_URL: "http://cart-service:8000"
      CUSTOMER_SERVICE_URL: "http://customer-service:8000"
      ORDER_SERVICE_URL: "http://order-service:8000"
      COMMENT_RATE_SERVICE_URL: "http://comment-rate-service:8000"
      STAFF_SERVICE_URL: "http://staff-service:8000"
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - auth-service
      - customer-service
      - book-service
      - cart-service
      - staff-service
      - manager-service
      - catalog-service
      - order-service
      - ship-service
      - pay-service
      - comment-rate-service
      - recommender-ai-service

  # ─────────────── BUSINESS SERVICES ───────────────
  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    volumes:
      - ./customer-service:/app
    depends_on:
      - postgres-customer

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    volumes:
      - ./book-service:/app
    depends_on:
      - postgres-book

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    volumes:
      - ./cart-service:/app
    depends_on:
      - postgres-cart

  staff-service:
    build: ./staff-service
    ports:
      - "8004:8000"
    volumes:
      - ./staff-service:/app
    depends_on:
      - postgres-staff

  manager-service:
    build: ./manager-service
    ports:
      - "8005:8000"
    volumes:
      - ./manager-service:/app
    depends_on:
      - postgres-manager

  catalog-service:
    build: ./catalog-service
    ports:
      - "8006:8000"
    volumes:
      - ./catalog-service:/app
    depends_on:
      - postgres-catalog

  order-service:
    build: ./order-service
    ports:
      - "8007:8000"
    volumes:
      - ./order-service:/app
    environment:
      RUNNING_IN_DOCKER: "true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      PAY_SERVICE_URL: "http://pay-service:8000"
      SHIP_SERVICE_URL: "http://ship-service:8000"
    depends_on:
      - postgres-order
      - rabbitmq

  ship-service:
    build: ./ship-service
    ports:
      - "8008:8000"
    volumes:
      - ./ship-service:/app
    environment:
      RUNNING_IN_DOCKER: "true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      FORCE_FAIL: "false"
    depends_on:
      - postgres-ship
      - rabbitmq

  pay-service:
    build: ./pay-service
    ports:
      - "8009:8000"
    volumes:
      - ./pay-service:/app
    environment:
      RUNNING_IN_DOCKER: "true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      FORCE_FAIL: "false"
    depends_on:
      - postgres-pay
      - rabbitmq

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    volumes:
      - ./comment-rate-service:/app
    depends_on:
      - postgres-comment-rate

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    volumes:
      - ./recommender-ai-service:/app
    depends_on:
      - postgres-recommender-ai

  # ─────────────── DATABASES ───────────────
  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5444:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data

  postgres-customer:
    image: postgres:15
    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"

  postgres-book:
    image: postgres:15
    environment:
      POSTGRES_DB: bookdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5434:5432"
    volumes:
      - book_data:/var/lib/postgresql/data

  postgres-cart:
    image: postgres:15
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5435:5432"
    volumes:
      - cart_data:/var/lib/postgresql/data

  postgres-staff:
    image: postgres:15
    environment:
      POSTGRES_DB: staffdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5436:5432"
    volumes:
      - staff_data:/var/lib/postgresql/data

  postgres-manager:
    image: postgres:15
    environment:
      POSTGRES_DB: managerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5437:5432"
    volumes:
      - manager_data:/var/lib/postgresql/data

  postgres-catalog:
    image: postgres:15
    environment:
      POSTGRES_DB: catalogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5438:5432"
    volumes:
      - catalog_data:/var/lib/postgresql/data

  postgres-order:
    image: postgres:15
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5439:5432"
    volumes:
      - order_data:/var/lib/postgresql/data

  postgres-ship:
    image: postgres:15
    environment:
      POSTGRES_DB: shipdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5440:5432"
    volumes:
      - ship_data:/var/lib/postgresql/data

  postgres-pay:
    image: postgres:15
    environment:
      POSTGRES_DB: paydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5441:5432"
    volumes:
      - pay_data:/var/lib/postgresql/data

  postgres-comment-rate:
    image: postgres:15
    environment:
      POSTGRES_DB: commentratedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5442:5432"
    volumes:
      - comment-rate_data:/var/lib/postgresql/data

  postgres-recommender-ai:
    image: postgres:15
    environment:
      POSTGRES_DB: recommenderaidb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5443:5432"
    volumes:
      - recommender-ai_data:/var/lib/postgresql/data

volumes:
  auth_data:
  customer_data:
  book_data:
  cart_data:
  staff_data:
  manager_data:
  catalog_data:
  order_data:
  ship_data:
  pay_data:
  comment-rate_data:
  recommender-ai_data:
