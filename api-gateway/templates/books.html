<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookStore – Browse Books</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #222; }
    a { text-decoration: none; color: inherit; }

    nav {
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 40px;
      height: 60px;
      gap: 32px;
    }
    nav .brand { font-size: 1.2rem; font-weight: 700; margin-right: auto; }
    nav a { font-size: 0.95rem; color: #c9d1d9; transition: color 0.15s; }
    nav a:hover, nav a.active { color: #fff; }
    nav a.active { border-bottom: 2px solid #6c63ff; padding-bottom: 3px; }

    main { max-width: 1100px; margin: 36px auto; padding: 0 20px; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; color: #1a1a2e; }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    .book-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s;
    }
    .book-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.12); }

    .book-cover {
      background: linear-gradient(135deg, #6c63ff 0%, #3f3d56 100%);
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .book-body { padding: 14px 16px; flex: 1; }
    .book-title { font-size: 0.93rem; font-weight: 600; line-height: 1.4; color: #111; margin-bottom: 4px; }
    .book-author { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
    .stock-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.73rem;
      background: #edf7ed;
      color: #2e7d32;
      font-weight: 500;
    }
    .stock-badge.low { background: #fff3e0; color: #e65100; }

    .book-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid #f0f0f0;
    }
    .book-price { font-size: 1.05rem; font-weight: 700; color: #6c63ff; }

    /* Add-to-cart form */
    .add-cart-form { display: flex; align-items: center; gap: 6px; }
    .qty-input {
      width: 44px;
      padding: 5px 6px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 0.82rem;
      text-align: center;
    }
    .btn-cart {
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cart:hover { background: #574fd6; }
    .btn-detail {
      background: #eef2ff;
      color: #4f46e5;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-detail:hover { background: #e0e7ff; }

    /* Toast notification */
    .toast {
      display: none;
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .empty { text-align: center; padding: 80px 0; color: #888; }
  </style>
</head>
<body>

<nav>
  <span class="brand">📚 BookStore</span>
  <a href="/books/" class="active">Books</a>
  <a href="/cart/1/">🛒 Cart</a>
  <a href="/dashboard/">⚙️ Dashboard</a>
</nav>

<main>
  <h1>All Books</h1>

  {% if books %}
    <div class="book-grid">
      {% for book in books %}
      <div class="book-card">
        <div class="book-cover">📖</div>
        <div class="book-body">
          <div class="book-title"><a href="/books/{{ book.id }}/" style="color: inherit; text-decoration: none;">{{ book.title }}</a></div>
          <div class="book-author">{{ book.author }}</div>
          <span class="stock-badge {% if book.stock <= 5 %}low{% endif %}">
            {{ book.stock }} in stock
          </span>
        </div>
        <div class="book-footer">
          <span class="book-price">${{ book.price }}</span>
          <form class="add-cart-form" method="POST" action="/cart/add/">
            {% csrf_token %}
            <input type="hidden" name="book_id" value="{{ book.id }}">
          <a href="/books/{{ book.id }}/" class="btn-detail">View Details</a>
            <input class="qty-input" type="number" name="quantity" value="1" min="1" max="{{ book.stock }}">
            <button class="btn-cart" type="submit">+ Cart</button>
          </form>
        </div>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="empty">
      <div style="font-size:3rem">📭</div>
      <p style="margin-top:12px">No books available right now.</p>
    </div>
  {% endif %}
</main>

<div class="toast" id="toast">✅ Book added to cart!</div>

<script>
  // Show toast if redirected after add
  const params = new URLSearchParams(location.search);
  if (params.get('added') === '1') {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
    history.replaceState(null, '', location.pathname);
  }
</script>

</body>
</html>
