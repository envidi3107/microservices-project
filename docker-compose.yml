version: "3.9"

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - customer-service
      - book-service
      - cart-service

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    depends_on:
      - postgres-customer

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    depends_on:
      - postgres-book

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    depends_on:
      - postgres-cart

  postgres-customer:
    image: postgres:15
    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - customer_data:/var/lib/postgresql/data

  postgres-book:
    image: postgres:15
    environment:
      POSTGRES_DB: bookdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5434:5432"
    volumes:
      - book_data:/var/lib/postgresql/data

  postgres-cart:
    image: postgres:15
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5435:5432"
    volumes:
      - cart_data:/var/lib/postgresql/data

volumes:
  customer_data:
  book_data:
  cart_data:
