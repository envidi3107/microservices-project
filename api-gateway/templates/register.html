<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - BookStore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    a { text-decoration: none; color: inherit; }

    nav {
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 40px;
      height: 60px;
      gap: 32px;
    }
    nav .brand { font-size: 1.2rem; font-weight: 700; margin-right: auto; }
    nav a { font-size: 0.95rem; color: #c9d1d9; transition: color 0.15s; }
    nav a:hover, nav a.active { color: #fff; }

    main { max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .card { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #1a1a2e; }

    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input[type="text"], input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    button { display: inline-block; background: #4f46e5; color: #fff; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: 600; }
    button:hover { background: #4338ca; }
    
    .message { margin-top: 16px; padding: 10px; border-radius: 4px; }
    .message.success { background: #e6ffed; color: #22863a; border: 1px solid #cce8ce; }
    .message.error { background: #ffeef0; color: #cb2431; border: 1px solid #f2c7cb; }
  </style>
</head>
<body>

<nav>
  <span class="brand">📚 BookStore</span>
  <a href="/books/">Books</a>
  <a href="/register/" class="active">Register</a>
  <a href="/dashboard/">Admin Dashboard</a>
</nav>

<main>
  <div class="card">
    <h1>Create an Account</h1>
    <p style="margin-bottom: 20px; color: #666;">Register to automatically activate your shopping cart!</p>

    {% if message %}
      <div class="message {{ message_type }}">
        {{ message }}
      </div>
    {% endif %}

    <form method="POST" action="/register/">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="john@example.com">
      </div>
      <button type="submit">Register</button>
    </form>
  </div>
</main>

</body>
</html>
